<script>
(function() {
  var PASSWORD = "exceet2025";
  var AUTH_KEY = "exceet_radar_auth_v1";
  
  if (localStorage.getItem(AUTH_KEY) === "granted") {
    document.getElementById("login-gate").style.display = "none";
  } else {
    document.getElementById("login-gate").style.display = "block";
    document.body.style.overflow = "hidden";
    
    var input = document.getElementById("pw-input");
    var btn = document.getElementById("pw-btn");
    var error = document.getElementById("pw-error");
    
    function tryLogin() {
      if (input.value === PASSWORD) {
        localStorage.setItem(AUTH_KEY, "granted");
        document.getElementById("login-gate").style.display = "none";
        document.body.style.overflow = "";
      } else {
        error.style.display = "block";
        input.style.borderColor = "#F87171";
        setTimeout(function() {
          error.style.display = "none";
          input.style.borderColor = "#252D40";
        }, 2000);
      }
    }
    
    btn.onclick = tryLogin;
    input.onkeydown = function(e) { if (e.key === "Enter") tryLogin(); };
  }
})();
</script>

async function callOpenAI(tender, criteria) {
  const prompt = `Du bist ein Bid-Analyst für exceet Card Group, einen führenden europäischen Hersteller von Sicherheitskarten, Chipkarten und Identitätsdokumenten.

UNTERNEHMENSPROFIL EXCEET:
- Standort: Kematen/Tirol (Österreich)

AUSSCHREIBUNG ZU ANALYSIEREN:
- Titel: ${tender.title}
- Auftraggeber: ${tender.authority}
- Land: ${tender.country || "Nicht angegeben"}

AUFGABE:
Erstelle eine detaillierte Bid-Analyse für diese Ausschreibung. Antworte NUR im folgenden JSON-Format (keine anderen Zeichen davor oder danach):

{
  "zusammenfassung": "2-3 Sätze Zusammenfassung der Ausschreibung",
  "empfehlung": "BIETEN / PRÜFEN / NICHT BIETEN",
  "empfehlungDetail": "1-2 Sätze Begründung",
  "chancen": ["Chance 1", "Chance 2", "Chance 3"],

  "geschaetzteGewinnchance": "XX%",
  "prioritaet": "HOCH / MITTEL / NIEDRIG"
}`;

  try {
    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + OPENAI_API_KEY

        model: "gpt-4o-mini",

function formatEuro(n) {
  if (!n || isNaN(n)) return "—";
  if (n >= 1000000) return `€ ${(n/1000000).toFixed(1)}M`;
  if (n >= 1000)    return `€ ${(n/1000).toFixed(0)}K`;
  return `€ ${n}`;
}

function detectCategory(text) {
  const t = text.toLowerCase();
  if (/führerschein|personalausweis|reisepass|ausweis|id-karte|aufenthaltstitel|behörde|ministerium/.test(t)) return "government";
  if (/bank|kredit|debit|zahlung|payment|maestro|emv|finanz|sparkasse|volksbank/.test(t)) return "banking";
  if (/öpnv|nahverkehr|bahn|bus|tram|skipass|liftpass|ticket|transport|verkehr/.test(t)) return "transport";
  if (/gesundheit|krankenversicherung|versicherung|health|insurance|krankenkasse|e-card/.test(t)) return "health";
  if (/zugang|zutritt|access|loyalty|kundenkarte|bonus|mitgliedskarte|hotel/.test(t)) return "access";
  return "government";
}

function scoreRelevance(tender, criteria) {
  const text = `${tender.title} ${tender.description || ""} ${tender.authority}`.toLowerCase();
  const excluded = criteria.exclusions.some(e => text.includes(e));
  if (excluded) return { score: 0, reasons: [], flags: ["❌ Ausgeschlossen: Nicht-Karten-Ausschreibung"] };

  const volNum = parseFloat((tender.value||"0").replace(/[^0-9]/g,""));
  const flags = [];
  if (volNum > 0 && volNum < criteria.minVolume) flags.push(`⚠️ Volumen unter Minimum (${formatEuro(criteria.minVolume)})`);
  if (volNum > 0 && volNum > criteria.maxVolume) flags.push(`⚠️ Volumen über Maximum (${formatEuro(criteria.maxVolume)})`);

  const unitMatch = text.match(/(\d[\d\.\s]*)\s*(stück|millionen|mio|mrd|stk|pieces|cards)/i);
  if (unitMatch) {
    let units = parseFloat(unitMatch[1].replace(/[\.\s]/g,""));
    if (text.includes("millionen")||text.includes("mio")) units *= 1000000;
    if (units > criteria.maxUnits) flags.push(`⚠️ Stückzahl (${(units/1000000).toFixed(0)}M) übersteigt Kematen-Kapazität (${(criteria.maxUnits/1000000).toFixed(0)}M)`);
  }

  const hits = {
    product: criteria.products.filter(k => text.includes(k)),
    tech:    criteria.technologies.filter(k => text.includes(k)),
    geo:     criteria.countries.map(c => c.toLowerCase()).filter(c => text.includes(c) || tender.country?.toLowerCase() === c),
    cert:    criteria.certifications.filter(k => text.includes(k)),
  };

  const wP = criteria.weightProduct / 100;
  const wT = criteria.weightTech    / 100;
  const wG = criteria.weightGeo     / 100;
  const wC = criteria.weightCert    / 100;
  const total = wP + wT + wG + wC || 1;

  const raw =
    Math.min(wP * 100, hits.product.length * 12 * wP) +
    Math.min(wT * 100, hits.tech.length    * 10 * wT) +
    Math.min(wG * 100, hits.geo.length     *  8 * wG) +
    Math.min(wC * 100, hits.cert.length    *  8 * wC);

  const score = Math.min(100, Math.round(raw * (100 / total)));

  const reasons = [
    hits.product.length && `Produkt: ${[...new Set(hits.product)].slice(0,2).join(", ")}`,
    hits.tech.length    && `Technologie: ${[...new Set(hits.tech)].slice(0,2).join(", ")}`,
    hits.geo.length     && `Region: ${[...new Set(hits.geo)].slice(0,2).join(", ")}`,
    hits.cert.length    && `Zertifizierung: ${[...new Set(hits.cert)].slice(0,2).join(", ")}`,
  ].filter(Boolean);

  return { score, reasons, flags };
}

          <span key={i} style={{ display:"inline-flex", alignItems:"center", gap:4, padding:"3px 8px", borderRadius:4, fontSize:11, fontWeight:600, background:`${color}18`, color, border:`1px solid ${color}35` }}>
            {it}
            <span onClick={()=>onRemove(i)} style={{ cursor:"pointer", opacity:0.6, fontSize:14, lineHeight:1 }}>×</span>
          </span>
        ))}
        {items.length===0&&<span style={{ fontSize:11, color:B.textMuted }}>Keine Einträge</span>}
      </div>
      <div style={{ display:"flex", gap:6 }}>
        <input value={val} onChange={e=>setVal(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter") add(); }}
          placeholder={placeholder}
          style={{ flex:1, background:B.bgMid, border:`1px solid ${B.border}`, borderRadius:6, padding:"6px 9px", color:B.text, fontSize:12, outline:"none" }}/>
        <button onClick={add} style={{ padding:"6px 12px", background:B.bgMid, border:`1px solid ${B.borderHi}`, borderRadius:6, color:B.text, fontSize:12, cursor:"pointer" }}>+ Add</button>
      </div>
    </div>
  );
};

function App() {

  // ── Lokale regelbasierte Analyse (kein API-Key nötig) ───────────────────────
  const localAnalyze = (t) => {
    const score = t.relevance || 0;
    const vol = parseFloat(t.value || 0);
    const days = t.deadline ? Math.ceil((new Date(t.deadline) - new Date("2025-03-10")) / 86400000) : null;
    const lines = [];

    // Empfehlung
    let empf, empfColor;
    const capWarning = t.flags && t.flags.some(f => f.includes("Kapazität") || f.includes("Stückzahl"));
    const volTooLow  = t.flags && t.flags.some(f => f.includes("unter Minimum"));
    const volTooHigh = t.flags && t.flags.some(f => f.includes("über Maximum"));

    if (score >= 75 && !capWarning && !volTooLow) {
      empf = "✅ BIETEN — hohe Relevanz, keine Kapazitätsprobleme";
      empfColor = "#34D399";
    } else if (score >= 75 && capWarning) {
      empf = "◐ MIT PARTNER — Stückzahl übersteigt Kematen-Kapazität";
      empfColor = "#FBBF24";
    } else if (score >= 40 && !volTooLow) {
      empf = "◐ PRÜFEN — mittlere Relevanz, detaillierte Analyse empfohlen";
      empfColor = "#FBBF24";
    } else if (volTooLow) {
      empf = "✗ NICHT BIETEN — Volumen unter Mindestgrenze";
      empfColor = "#F87171";
    } else {
      empf = "✗ NICHT BIETEN — zu geringe Relevanz für exceet";
      empfColor = "#F87171";
    }

    // Stärken
    const staerken = [];
    const text = (t.title + " " + (t.description || "")).toLowerCase();
    if (/polycarbonat|hochsicherheit|sicherheitsdokument/.test(text)) staerken.push("Polycarbonat-Expertise & ISO 14298 Zertifizierung");
    if (/rfid|nfc|kontaktlos|dual interface/.test(text)) staerken.push("RFID/NFC Dual Interface Technologie");
    if (/emv|chip|personalisierung/.test(text)) staerken.push("EMV Chip-Personalisierung");
    if (/führerschein|ausweis|pass|dokument/.test(text)) staerken.push("Sicherheitsdokumente-Produktion");
    if (/visa|mastercard/.test(text)) staerken.push("Visa/Mastercard Zertifizierung vorhanden");
    if (staerken.length === 0) staerken.push("Kartenproduktion", "EU-Standorte & Qualitätszertifizierungen");

    // Deadline-Hinweis
    const deadlineHint = days === null ? "" : days <= 14 ? `⚠️ Sehr kurze Frist: nur noch ${days} Tage bis Deadline!` :
      days <= 30 ? `⏱ Deadline in ${days} Tagen — Angebot zeitnah vorbereiten` :
      `✓ Ausreichend Zeit: ${days} Tage bis Deadline`;

    return { empf, empfColor, staerken: staerken.slice(0, 3), deadlineHint, score };
  };

  const [report, setReport] = useState(null);
  const [reportLoading, setReportLoading] = useState(false);
  
  const genReport = async () => {
    const top = scoredTenders.filter(t=>t.relevance>=60).sort((a,b)=>b.relevance-a.relevance).slice(0,8);

      auftraggeber: t.authority,

      kategorie: t.category,

    const prompt = `Du bist ein strategischer Berater für exceet Card Group, einen führenden europäischen Hersteller von Sicherheitskarten und Identitätsdokumenten.

UNTERNEHMENSPROFIL:
- Standort: Kematen/Tirol (Österreich)
- Produkte: Chipkarten, Bankkarten (EMV), Ausweise, Führerscheine, RFID/NFC-Karten
- Kapazität: ${(criteria.maxUnits/1000000).toFixed(0)} Mio. Karten/Jahr
- Zertifizierungen: Visa, Mastercard, ISO 14298, ISO 27001

AKTUELLE AUSSCHREIBUNGEN (${top.length} Stück):
${JSON.stringify(tenderSummaries, null, 2)}

AUFGABE:
Erstelle einen Executive Summary Wochenbericht für das Management. Antworte NUR im folgenden JSON-Format:

{
  "executive_summary": "3-4 Sätze Zusammenfassung der Woche für das Management",
  "marktlage": "2-3 Sätze zur aktuellen Marktlage im Bereich Sicherheitskarten",
  "top_chancen": [

}`;

          "Authorization": "Bearer " + apiKey

          model: "gpt-4o-mini",
          messages: [{ role: "user", content: prompt }],
          temperature: 0.7,
          max_tokens: 1500

      console.log("Response status:", response.status);
      
      if (!response.ok) {
        const errorData = await response.text();
        console.error("API Error Response:", errorData);
        throw new Error("API Fehler " + response.status + ": " + errorData.substring(0, 100));
      }
      
      const data = await response.json();
      console.log("API Response received");
      
      if (!data.choices || !data.choices[0]) {
        throw new Error("Keine Antwort von der KI erhalten");
      }
      
      const content = data.choices[0].message.content.trim();
      console.log("Content received, length:", content.length);
      
      const jsonMatch = content.match(/\{[\s\S]*\}/);
      
      if (jsonMatch) {
        const parsed = JSON.parse(jsonMatch[0]);
        console.log("Report parsed successfully");
        setReport(parsed);
      } else {
        console.error("No JSON found in response:", content.substring(0, 200));
        throw new Error("Ungültiges Antwortformat von der KI");
      }
    } catch (err) {
      console.error("Report Generation Error:", err);
      setReport({ error: err.message || "Unbekannter Fehler" });

                                    <div style={{ fontSize:9, color:B.green, textTransform:"uppercase", letterSpacing:0.8, marginBottom:8 }}>✅ Chancen</div>

                                <div style={{ fontSize:10, color:B.textMuted, marginTop:10, padding:"6px 10px", background:B.bgCard, borderRadius:5, display:"flex", alignItems:"center", justifyContent:"space-between" }}>

                                  <span>Score: {t.relevance}/100</span>

                              </div>

                          })()}

                          </div>

                </div>
                <div style={{ marginBottom:16 }}>
                  <div style={{ fontSize:10, color:B.textSub, textTransform:"uppercase", letterSpacing:0.8, marginBottom:5 }}>Mindest-Auftragsvolumen</div>
                  <NumInp value={criteria.minVolume} onChange={v=>updC("minVolume",v)} min={0} step={50000} prefix="€" suffix="Min"/>
                  <div style={{ marginTop:5, fontSize:12, color:B.blueLight }}>{formatEuro(criteria.minVolume)}</div>
                </div>
                <div style={{ marginBottom:16 }}>
                  <div style={{ fontSize:10, color:B.textSub, textTransform:"uppercase", letterSpacing:0.8, marginBottom:5 }}>Maximum Auftragsvolumen</div>
                  <NumInp value={criteria.maxVolume} onChange={v=>updC("maxVolume",v)} min={0} step={500000} prefix="€" suffix="Max"/>
                  <div style={{ marginTop:5, fontSize:12, color:B.blueLight }}>{formatEuro(criteria.maxVolume)}</div>
                </div>
                <div style={{ marginBottom:16 }}>
                  <div style={{ fontSize:10, color:B.textSub, textTransform:"uppercase", letterSpacing:0.8, marginBottom:5 }}>🏭 Kapazität Kematen (Stück/Jahr)</div>
                  <NumInp value={criteria.maxUnits} onChange={v=>updC("maxUnits",v)} min={1000000} step={1000000} suffix="Stück/Jahr"/>
                  <div style={{ marginTop:5, fontSize:12, color:B.green }}>{(criteria.maxUnits/1000000).toFixed(0)} Mio. Karten/Jahr</div>
                </div>
                <div style={{ background:B.bgMid, border:`1px solid ${B.border}`, borderRadius:7, padding:"10px 12px" }}>
                  <div style={{ fontSize:11, color:B.textSub, marginBottom:6 }}>Aktuelle Limits Kematen</div>
                  <div style={{ fontSize:12 }}>Min: <strong style={{ color:B.blueLight }}>{formatEuro(criteria.minVolume)}</strong> · Max: <strong style={{ color:B.blueLight }}>{formatEuro(criteria.maxVolume)}</strong></div>
                  <div style={{ fontSize:12, marginTop:4 }}>Kapazität: <strong style={{ color:B.green }}>{(criteria.maxUnits/1000000).toFixed(0)} Mio. Stück/Jahr</strong></div>
                </div>
              </div>

              <div style={{ background:B.bgCard, border:`1px solid ${B.border}`, borderRadius:10, padding:20 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:16 }}>
                  <Accent/><span style={{ fontSize:14, fontWeight:700 }}>Score-Gewichtung</span>
                </div>
                <div style={{ fontSize:12, color:B.textSub, marginBottom:16 }}>Wie stark zählt jedes Kriterium für den Relevanz-Score (0–100)?</div>
                {[
                  ["weightProduct","Produkttyp passt",       B.blueLight],
                  ["weightTech",   "Technologie (RFID/EMV…)",B.green    ],
                  ["weightGeo",    "Geographie (AT/DE/CH…)", B.amber    ],
                  ["weightCert",   "Zertifizierungen",       "#A78BFA"  ],
                ].map(([key,label,color])=>(
                  <div key={key} style={{ marginBottom:14 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                      <span style={{ fontSize:12 }}>{label}</span>
                      <span style={{ fontSize:12, fontWeight:700, color }}>{criteria[key]}</span>
                    </div>
                    <input type="range" min={0} max={100} step={5} value={criteria[key]}
                      onChange={e=>updC(key, Number(e.target.value))}
                      style={{ width:"100%", accentColor:color }}/>
                    <div style={{ height:4, borderRadius:2, background:B.bgMid, marginTop:3 }}>
                      <div style={{ height:"100%", width:`${criteria[key]}%`, background:color, borderRadius:2 }}/>
                    </div>
                  </div>
                ))}
              </div>

              <div style={{ background:B.bgCard, border:`1px solid ${B.border}`, borderRadius:10, padding:20 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
                  <Accent/><span style={{ fontSize:14, fontWeight:700 }}>Relevante Länder</span>
                </div>
                <TagEditor items={criteria.countries} onAdd={v=>updC("countries",[...criteria.countries,v.toUpperCase()])} onRemove={i=>updC("countries",criteria.countries.filter((_,j)=>j!==i))} placeholder="Ländercode (z.B. FR)..." color={B.blueLight}/>
              </div>

              <div style={{ background:B.bgCard, border:`1px solid ${B.border}`, borderRadius:10, padding:20 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
                  <Accent/><span style={{ fontSize:14, fontWeight:700 }}>Produkt-Keywords</span>
                </div>
                <TagEditor items={criteria.products} onAdd={v=>updC("products",[...criteria.products,v])} onRemove={i=>updC("products",criteria.products.filter((_,j)=>j!==i))} placeholder="z.B. smartcard..." color={B.blueLight}/>
              </div>

              <div style={{ background:B.bgCard, border:`1px solid ${B.border}`, borderRadius:10, padding:20 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
                  <Accent/><span style={{ fontSize:14, fontWeight:700 }}>Technologie-Keywords</span>
                </div>
                <TagEditor items={criteria.technologies} onAdd={v=>updC("technologies",[...criteria.technologies,v])} onRemove={i=>updC("technologies",criteria.technologies.filter((_,j)=>j!==i))} placeholder="z.B. contactless..." color={B.green}/>
              </div>

              <div style={{ background:B.bgCard, border:`1px solid ${B.border}`, borderRadius:10, padding:20 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
                  <Accent/><span style={{ fontSize:14, fontWeight:700 }}>Ausschluss-Keywords</span>
                </div>
                <div style={{ fontSize:12, color:B.textSub, marginBottom:10 }}>Diese Begriffe → Score sofort 0</div>
                <TagEditor items={criteria.exclusions} onAdd={v=>updC("exclusions",[...criteria.exclusions,v])} onRemove={i=>updC("exclusions",criteria.exclusions.filter((_,j)=>j!==i))} placeholder="z.B. catering..." color={B.red}/>
              </div>

            </div>
          </div>
        )}

        {/* PORTALS */}
        {tab==="portals"&&(
          <div style={{ padding:28 }}>
            <div style={{ fontSize:22, fontWeight:800, marginBottom:4 }}>Portale &amp; API-Keys</div>
            <div style={{ fontSize:13, color:B.textSub, marginBottom:26 }}>API-Keys von eurer IT eintragen — Tender Radar verbindet sich dann automatisch beim Abruf</div>

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:28 }}>
              {PORTALS.map(p=>{
                const hasKey=p.free||!!apiKeys[p.key];
                const isEditing=editKey===p.key;
                return (
                  <div key={p.key} style={{ background:B.bgCard, border:`2px solid ${hasKey?B.green+"50":B.border}`, borderRadius:10, padding:20 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
                      <div>
                        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                          <span style={{ fontSize:22 }}>{p.flag}</span>
                          <span style={{ fontSize:15, fontWeight:700 }}>{p.name}</span>
                          {p.free&&<span style={{ fontSize:10, background:B.greenDim, color:B.green, padding:"2px 7px", borderRadius:99, fontWeight:700 }}>KOSTENLOS</span>}
                        </div>
                        <div style={{ fontSize:11, color:B.textSub }}>{p.url}</div>
                      </div>
                      <div style={{ width:9, height:9, borderRadius:"50%", background:hasKey?B.green:B.textMuted, boxShadow:hasKey?`0 0 7px ${B.green}`:"none" }}/>
                    </div>
                    <div style={{ fontSize:12, color:B.textSub, marginBottom:14, lineHeight:1.5 }}>{p.desc}</div>
                    <div style={{ fontSize:11, color:B.textMuted, marginBottom:10 }}>Länder: {p.countries.join(", ")}</div>
                    {p.free?(
                      <div style={{ fontSize:12, color:B.green, background:B.greenDim, padding:"9px 12px", borderRadius:6 }}>✅ Kein Key nötig — direkt verfügbar via CPV-Codes</div>
                    ):isEditing?(
                      <div style={{ display:"flex", gap:8 }}>
                        <input value={tempKey} onChange={e=>setTempKey(e.target.value)} placeholder="API-Key einfügen..." type="password"
                          style={{ flex:1, background:B.bgMid, border:`1px solid ${B.blueDark}`, borderRadius:6, padding:"7px 10px", color:B.text, fontSize:12, outline:"none" }}/>
                        <button onClick={()=>{ setApiKeys(prev=>({...prev,[editKey]:tempKey})); setEditKey(null); setTempKey(""); }}
                          style={{ padding:"7px 14px", background:B.blueDark, color:B.white, border:"none", borderRadius:6, fontWeight:700, fontSize:12, cursor:"pointer" }}>Speichern</button>
                        <button onClick={()=>{ setEditKey(null); setTempKey(""); }}
                          style={{ padding:"7px 10px", background:B.bgMid, color:B.textSub, border:`1px solid ${B.border}`, borderRadius:6, fontSize:12, cursor:"pointer" }}>✕</button>
                      </div>
                    ):(
                      <div>
                        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                          <div style={{ flex:1, fontSize:12, background:B.bgMid, border:`1px solid ${B.border}`, borderRadius:6, padding:"7px 10px", color:apiKeys[p.key]?B.green:B.textMuted }}>
                            {apiKeys[p.key]?"●●●●●●●● (gespeichert)":"Kein Key hinterlegt"}
                          </div>
                          <button onClick={()=>{ setEditKey(p.key); setTempKey(apiKeys[p.key]||""); }}
                            style={{ padding:"7px 12px", background:B.bgMid, border:`1px solid ${B.borderHi}`, borderRadius:6, color:B.text, fontSize:12, cursor:"pointer", fontWeight:600 }}>
                            {apiKeys[p.key]?"Ändern":"+ Key"}
                          </button>
                        </div>
                        <a href={p.docUrl} target="_blank" rel="noopener noreferrer" style={{ fontSize:11, color:B.blueLight, textDecoration:"none", display:"block", marginTop:8 }}>
                          📖 API-Dokumentation &amp; Key beantragen →
                        </a>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            <div style={{ background:B.bgCard, border:`1px solid ${B.border}`, borderRadius:10, padding:20 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
                <Accent/><span style={{ fontSize:14, fontWeight:700 }}>Aktive CPV-Codes (TED EU)</span>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:8 }}>
                {EXCEET_CPV.map(cpv=>{
                  const cat=CATEGORIES.find(c=>c.key===cpv.category)||CATEGORIES[0];
                  return (
                    <div key={cpv.code} style={{ background:B.bgMid, border:`1px solid ${B.border}`, borderRadius:7, padding:"10px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <div>
                        <div style={{ fontSize:12, fontWeight:600 }}>{cpv.label}</div>
                        <div style={{ fontSize:10, color:B.textSub, fontFamily:"monospace", marginTop:1 }}>{cpv.code}</div>
                      </div>
                      <Tag color={cat.color}>{cat.icon} {cat.label}</Tag>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* MODAL */}
      {showAdd&&(
        <div style={{ position:"fixed", inset:0, background:"#00000090", zIndex:50, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
          <div style={{ background:B.bgCard, border:`1px solid ${B.border}`, borderRadius:12, padding:26, width:"100%", maxWidth:540 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:18 }}>
              <Accent/><span style={{ fontSize:15, fontWeight:700 }}>Ausschreibung manuell hinzufügen</span>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
              {[["Titel *","title","Ausschreibung..."],["Auftraggeber *","authority","Behörde / Bank..."],["Land","country","AT"],["Volumen (Zahl)","value","4200000"],["Deadline","deadline",""],["Quelle","source","Vergabe.at"]].map(([l,k,ph])=>(
                <div key={k}>
                  <div style={{ fontSize:10, color:B.textSub, textTransform:"uppercase", letterSpacing:0.8, marginBottom:4 }}>{l}</div>
                  <input value={newT[k]} onChange={e=>setNewT(p=>({...p,[k]:e.target.value}))} placeholder={ph} type={k==="deadline"?"date":"text"}
                    style={{ width:"100%", background:B.bgMid, border:`1px solid ${B.border}`, borderRadius:6, padding:"8px 10px", color:B.text, fontSize:13, outline:"none" }}/>
                </div>
              ))}
            </div>
            <div style={{ marginBottom:16 }}>
              <div style={{ fontSize:10, color:B.textSub, textTransform:"uppercase", letterSpacing:0.8, marginBottom:4 }}>
                Beschreibung <span style={{ color:B.blueLight }}>(für KI &amp; Stückzahl-Check wichtig!)</span>
              </div>
              <textarea value={newT.description} onChange={e=>setNewT(p=>({...p,description:e.target.value}))}
                placeholder="z.B. RFID Chipkarte Polycarbonat Personalisierung EMV Österreich 5 Millionen Stück..." rows={3}
                style={{ width:"100%", background:B.bgMid, border:`1px solid ${B.border}`, borderRadius:6, padding:"8px 10px", color:B.text, fontSize:13, outline:"none", resize:"vertical" }}/>
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <Btn primary onClick={addManual}>✓ Hinzufügen</Btn>
              <Btn onClick={()=>setShowAdd(false)}>Abbrechen</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
